<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOMNAO STORE Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #fff9fb 0%, #fcecf2 100%); min-height: 100vh; }
        @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 20px 50px -10px rgba(244, 114, 182, 0.15), inset 0 2px 10px rgba(255, 255, 255, 0.5); }
        .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .virtual-card:hover { transform: translateY(-4px); }
        .virtual-card:active { transform: translateY(2px) scale(0.98); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { cream: { 50: '#fffdfa', 100: '#fdf5ee', 200: '#fae8d4', }, brown: { 300: '#d4b49e', 400: '#bc9680', 500: '#8b5e3c', 600: '#5c3d26', }, pink: { 50: '#fff0f5', 100: '#ffe0ec', 200: '#ffc2d9', 300: '#ffa3c6', 400: '#ff85b3', 500: '#ff66a0', } } } } }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-brown-600 relative overflow-x-hidden">

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-brown-500/95 backdrop-blur-sm text-cream-50 px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-brown-400">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-pink-200">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        คัดลอกข้อมูลเรียบร้อย
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        <div class="text-center pt-2 pb-2 relative">
            <h1 class="text-2xl font-bold tracking-tight text-pink-500 flex items-center justify-center gap-2">
                LOMNAO STORE
            </h1>
            <p class="text-sm font-medium text-brown-400 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-3 relative z-10">
            <div class="relative p-2 rounded-[36px] z-10">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
                    <img src="https://i.postimg.cc/yYXXLQnm/att-YZKp-Oou02U1m01U9E7IVQ5yixn-Mty-Ak-Ll-S0rpd-OVE00.jpg" alt="บัญชีร้านลมหนาว" class="w-full h-auto object-cover">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <p class="text-[15px] font-medium leading-relaxed text-brown-600">
                        ชื่อบัญชี <span class="text-pink-500 font-bold bg-pink-50/80 px-2.5 py-0.5 rounded-lg border border-pink-100">อนุงค์นุช เพชรสังฆาตร</span>
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card relative bg-gradient-to-br from-brown-400 to-brown-500 rounded-[24px] p-5 shadow-lg shadow-brown-500/20 cursor-pointer border border-brown-300/30" onclick="copyText('165-374-8740', this, 'kbank')">
                        <div class="relative z-10 flex justify-between items-center">
                            <span class="text-white font-bold text-sm tracking-wider">KBank</span>
                            <button class="kbank-btn bg-white text-brown-500 text-[12px] font-bold px-4 py-2 rounded-full">คัดลอก</button>
                        </div>
                        <div class="mt-2 text-white font-bold text-[22px] tracking-widest">165-374-8740</div>
                    </div>

                    <div class="virtual-card relative bg-gradient-to-br from-pink-300 to-pink-400 rounded-[24px] p-5 shadow-lg shadow-pink-400/20 cursor-pointer border border-pink-200/50" onclick="copyText('096-793-6500', this, 'true')">
                        <div class="relative z-10 flex justify-between items-center">
                            <span class="text-white font-bold text-sm tracking-wider">TrueMoney</span>
                            <button class="true-btn bg-white text-pink-500 text-[12px] font-bold px-4 py-2 rounded-full">คัดลอก</button>
                        </div>
                        <div class="mt-2 text-white font-bold text-[22px] tracking-widest">096-793-6500</div>
                    </div>

                    <div class="virtual-card bg-white border border-pink-100 rounded-[24px] p-4 flex justify-between items-center cursor-pointer hover:bg-pink-50 transition-all" onclick="copyText('ซื้อขายกับร้านลมหนาว', this, 'note')">
                        <span class="text-[13px] font-medium text-brown-600">ซื้อขายกับร้านลมหนาว</span>
                        <button class="note-btn text-[11px] bg-pink-100 text-pink-500 px-3 py-1 rounded-full font-bold">คัดลอก</button>
                    </div>

                    <div class="relative bg-gradient-to-br from-pink-100/90 to-pink-50/90 rounded-[20px] p-3.5 border-2 border-dashed border-pink-300">
                        <div class="text-[12px] text-brown-600 leading-relaxed">
                            <span class="text-pink-500 font-bold">ทรูมันนี่ไม่บวกเพิ่ม</span> นะคะ<br>
                            <span class="text-brown-400">รบกวนแปะสลิปทุกครั้งหลังโอนด้วยน้า</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, containerElement, type) {
            navigator.clipboard.writeText(text);
            showToast();
            const btn = containerElement.querySelector('.' + type + '-btn');
            const originalText = btn.innerText;
            btn.innerText = "สำเร็จ";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        }
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', 'translate-y-4'); }, 2500);
        }
    </script>
</body>
</html>
